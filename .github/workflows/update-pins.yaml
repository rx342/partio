name: Update npins

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 4" # runs weekly on thursday at 02:00 UTC

jobs:
  update-npins:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr-url: ${{ steps.pr.outputs.pull-request-url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c # v2026-02-22

      # https://git.lix.systems/lix-project/lix/issues/545#issuecomment-8412
      - name: Fixes and hacks
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Update npins
        run: |
          nix-shell -p npins --run "npins upgrade"
          nix-shell -p npins --run "npins update"

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create Pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        id: pr
        with:
          title: "chore: update npins"
          commit-message: "chore: update npins"
          body: "Automated `npins` update."
          branch: update-npins
          token: ${{ steps.generate-token.outputs.token }}
